<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="/">ELBaph lab</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="/diagnostics">Diagnostics</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ .OpsLinkURL }}" target="_blank" rel="noreferrer">Ops</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="p-5 mb-4 bg-white rounded-3 border">
      <h1 class="display-6 fw-bold">Service healthiness</h1>
      <p class="fs-5 text-secondary mb-0">
        Live support snapshot for edge routing and internal support services.
      </p>
    </div>

    <div class="row g-3">
      {{ range .Services }}
      <div class="col-md-6">
        <div class="card shadow-sm border-0 h-100">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h2 class="h5 mb-0">{{ .Name }}</h2>
              <span class="badge bg-secondary text-uppercase">{{ .Status }}</span>
            </div>
            <p class="text-muted mb-0">{{ .Details }}</p>
          </div>
        </div>
      </div>
      {{ end }}
    </div>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</body>
</html>
